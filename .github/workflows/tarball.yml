name: Build Wanderer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend once
        working-directory: web
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64,linux/arm/v7 \
            -f Dockerfile \
            --output type=local,dest=web_build .

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: web_build
          path: web_build

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64, arm/v7]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4

      # ----------------------------
      # Download frontend build
      # ----------------------------
      - uses: actions/download-artifact@v4
        with:
          name: web_build
          path: web_build

      # ----------------------------
      # Build DB and Search binaries
      # ----------------------------
      - name: Build DB binary
        run: |
          docker buildx build \
            --platform linux/${ARCH} \
            -f db/Dockerfile \
            --output type=local,dest=db_build .

      - name: Build Meilisearch binary
        run: |
          docker buildx build \
            --platform linux/${ARCH} \
            -f search/Dockerfile \
            --output type=local,dest=meili_build .

      # ----------------------------
      # Package tarball
      # ----------------------------
      - name: Package build
        run: |
          mkdir -p wanderer-build/db
          mkdir -p wanderer-build/web
          mkdir -p wanderer-build/meilisearch

          cp db_build/pocketbase wanderer-build/db/pocketbase
          cp -r web_build/* wanderer-build/web/
          cp meili_build/meilisearch wanderer-build/meilisearch

          tar -czf wanderer-${VERSION}-${ARCH}.tar.gz wanderer-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wanderer-${{ env.VERSION }}-${{ env.ARCH }}
          path: wanderer-${{ env.VERSION }}-${{ env.ARCH }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Wanderer ${{ github.ref_name }}"
          files: artifacts/**/*.tar.gz
